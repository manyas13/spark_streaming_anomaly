    path: "V6"
    type: "double"
  V7:
    path: "V7"
    type: "double"
  V8:
    path: "V8"
    type: "double"
  V9:
    path: "V9"
    type: "double"
  V10:
    path: "V10"
    type: "double"
  V11:
    path: "V11"
    type: "double"
  V12:
    path: "V12"
    type: "double"
  V13:
    path: "V13"
    type: "double"
  V14:
    path: "V14"
    type: "double"
  V15:
