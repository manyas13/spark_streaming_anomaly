# 3. MOTOR DE INFERENCIA DE MACHINE LEARNING
# ---------------------------------------------------------
model:
  name: "FraudDetector_Kaggle"
  version: "v1.0.0"
  path: "/opt/spark/work-dir/src/models/modelo_fraude.pkl"
  type: "sklearn"
  # Inyectamos 29 variables al modelo (Excluimos 'Time' según tu diseño original)
  features:
    - "Time"
    - "V1"
    - "V2"
    - "V3"
    - "V4"
    - "V5"
    - "V6"
    - "V7"
    - "V8"
    - "V9"
    - "V10"
    - "V11"
    - "V12"
    - "V13"
    - "V14"
    - "V15"
    - "V16"
    - "V17"
    - "V18"
    - "V19"
    - "V20"
    - "V21"
    - "V22"
    - "V23"
    - "V24"
    - "V25"
    - "V26"
    - "V27"
    - "V28"
    - "Amount"

# 4. ALMACENAMIENTO DE RESULTADOS
# ---------------------------------------------------------
sink:
  format: "jdbc"
  mode: "append"
  checkpointLocation: "/opt/spark/work-dir/checkpoints/postgresql_kaggle_v2"

  options:
    url: "jdbc:postgresql://postgres_db:5432/fraud_detection"
    dbtable: "alertas_fraude"
    user: "tfm_user"
    password: "tfm_password"
    driver: "org.postgresql.Driver"