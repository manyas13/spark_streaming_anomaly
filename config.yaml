# =========================================================
# CONFIGURACIÓN FINAL DEL PIPELINE (ARQUITECTURA AGNÓSTICA)
# =========================================================

# 1. INGESTA DE DATOS
# ---------------------------------------------------------
kafka:
  bootstrap_servers: "kafka:9093"
  topic: "transactions"
  starting_offsets: "latest"

# 2. PARSEADOR Y TRANSFORMADOR UNIFICADO
# ---------------------------------------------------------
schema:
  Time:
    path: "Time"
    type: "double"
  V1:
    path: "V1"
    type: "double"
  V2:
    path: "V2"
    type: "double"
  V3:
    path: "V3"
    type: "double"
  V4:
    path: "V4"
    type: "double"
