app_name: "StreamingFraudDetector"

kafka:
  bootstrap_servers: "kafka:9093"
  topic: "transactions"
  starting_offsets: "earliest"

schema:
  Time: "double"
  V1: "double"
  V2: "double"
  V3: "double"
  V4: "double"
  V5: "double"
  V6: "double"
  V7: "double"
  V8: "double"
  V9: "double"
  V10: "double"
  V11: "double"
  V12: "double"
  V13: "double"
  V14: "double"
  V15: "double"
  V16: "double"
  V17: "double"
  V18: "double"
  V19: "double"
  V20: "double"
  V21: "double"
  V22: "double"
  V23: "double"
  V24: "double"
  V25: "double"
  V26: "double"
  V27: "double"
  V28: "double"
  Amount: "double"
  Class: "double"

model:
  path: "models/fraud_model.pkl"
  # Features que el modelo usará para predecir (excluimos 'Time' y 'Class')
  features: ["V1", "V2", "V3", "V4", "V5", "V6", "V7", "V8", "V9", "V10", "V11", "V12", "V13", "V14", "V15", "V16", "V17", "V18", "V19", "V20", "V21", "V22", "V23", "V24", "V25", "V26", "V27", "V28", "Amount"]

postgres:
  url: "jdbc:postgresql://postgres_db:5432/fraud_detection"
  user: "tfm_user"
  password: "tfm_password"
  dbtable: "alerts"